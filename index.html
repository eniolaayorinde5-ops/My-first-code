<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Todo Card - Stage 0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .todo-card {
            transition: all 0.2s ease;
        }
        .completed .todo-title {
            text-decoration: line-through;
            opacity: 0.7;
        }
        .tag {
            transition: all 0.1s ease;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex items-center justify-center p-4">

<article
        data-testid="test-todo-card"
        class="todo-card bg-zinc-900 border border-zinc-700 rounded-2xl shadow-xl max-w-md w-full overflow-hidden">

    <!-- Header -->
    <div class="px-6 pt-6 pb-4 border-b border-zinc-700 flex items-start justify-between">
        <div class="flex items-center gap-3">
            <!-- Checkbox -->
            <input
                    type="checkbox"
                    id="todo-complete"
                    data-testid="test-todo-complete-toggle"
                    class="w-5 h-5 accent-emerald-500 cursor-pointer focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 focus:ring-offset-zinc-900 rounded"
                    onchange="toggleComplete(this)"
            >
            <label for="todo-complete" class="sr-only">Mark as complete</label>
        </div>

        <div class="flex gap-2">
            <button
                    data-testid="test-todo-edit-button"
                    onclick="editTodo()"
                    class="px-4 py-1.5 text-sm font-medium bg-zinc-800 hover:bg-zinc-700 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500"
                    aria-label="Edit todo">
                Edit
            </button>
            <button
                    data-testid="test-todo-delete-button"
                    onclick="deleteTodo()"
                    class="px-4 py-1.5 text-sm font-medium bg-red-950 hover:bg-red-900 text-red-400 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-red-500"
                    aria-label="Delete todo">
                Delete
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="p-6 space-y-5">

        <!-- Title -->
        <h2
                data-testid="test-todo-title"
                class="todo-title text-2xl font-semibold text-white leading-tight">
            Finish Frontend Wizards Stage 0
        </h2>

        <!-- Description -->
        <p
                data-testid="test-todo-description"
                class="text-zinc-400 text-[15px] leading-relaxed">
            Build a clean, accessible, and fully testable Todo Item Card component with all required data-testid attributes.
        </p>

        <!-- Priority & Status -->
        <div class="flex items-center gap-3">
            <!-- Priority -->
            <span
                    data-testid="test-todo-priority"
                    class="inline-flex items-center px-3 py-1 text-xs font-semibold rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/30">
          High
        </span>

            <!-- Status -->
            <span
                    data-testid="test-todo-status"
                    id="status-badge"
                    class="inline-flex items-center px-3 py-1 text-xs font-semibold rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/30">
          In Progress
        </span>
        </div>

        <!-- Due Date & Time Remaining -->
        <div class="flex flex-col sm:flex-row sm:items-center gap-4 text-sm">
            <div class="flex items-center gap-2">
                <span class="text-zinc-500">Due:</span>
                <time
                        data-testid="test-todo-due-date"
                        id="due-date"
                        class="font-medium text-zinc-300">
                    March 1, 2026
                </time>
            </div>

            <div
                    data-testid="test-todo-time-remaining"
                    id="time-remaining"
                    class="font-medium text-emerald-400">
                Due in 318 days
            </div>
        </div>

        <!-- Tags -->
        <div>
            <ul
                    data-testid="test-todo-tags"
                    class="flex flex-wrap gap-2">
                <li>
            <span data-testid="test-todo-tag-work"
                  class="tag inline-block px-3 py-1 text-xs bg-zinc-800 hover:bg-zinc-700 rounded-full border border-zinc-600 text-zinc-300">
              work
            </span>
                </li>
                <li>
            <span data-testid="test-todo-tag-urgent"
                  class="tag inline-block px-3 py-1 text-xs bg-red-500/10 text-red-400 rounded-full border border-red-500/30">
              urgent
            </span>
                </li>
                <li>
            <span class="tag inline-block px-3 py-1 text-xs bg-purple-500/10 text-purple-400 rounded-full border border-purple-500/30">
              frontend
            </span>
                </li>
            </ul>
        </div>
    </div>
</article>

<script>
    // Sample due date: March 1, 2026 at 18:00 UTC
    const dueDate = new Date('2026-03-01T18:00:00Z');

    function updateTimeRemaining() {
        const now = new Date();
        const diffMs = dueDate - now;
        const element = document.getElementById('time-remaining');

        if (diffMs < 0) {
            element.className = "font-medium text-red-400";
            element.textContent = "Overdue!";
            return;
        }

        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

        let text = "";

        if (diffDays > 1) {
            text = `Due in ${diffDays} days`;
        } else if (diffDays === 1) {
            text = "Due tomorrow";
        } else if (diffHours > 1) {
            text = `Due in ${diffHours} hours`;
        } else if (diffHours === 1) {
            text = "Due in 1 hour";
        } else {
            text = "Due now!";
        }

        element.textContent = text;
    }

    // Toggle completion
    function toggleComplete(checkbox) {
        const card = document.querySelector('[data-testid="test-todo-card"]');

        if (checkbox.checked) {
            card.classList.add('completed');
            document.getElementById('status-badge').textContent = "Done";
            document.getElementById('status-badge').className =
                "inline-flex items-center px-3 py-1 text-xs font-semibold rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/30";
        } else {
            card.classList.remove('completed');
            document.getElementById('status-badge').textContent = "In Progress";
            document.getElementById('status-badge').className =
                "inline-flex items-center px-3 py-1 text-xs font-semibold rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/30";
        }
    }

    // Dummy actions
    function editTodo() {
        console.log("Edit button clicked");
        alert("Edit functionality would open here ✨");
    }

    function deleteTodo() {
        if (confirm("Delete this todo?")) {
            console.log("Delete button clicked");
            alert("Todo deleted (demo)");
        }
    }

    // Initialize
    window.onload = () => {
        // Set initial due date display
        const dueDateEl = document.getElementById('due-date');
        dueDateEl.textContent = dueDate.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
        });

        // Initial time remaining
        updateTimeRemaining();

        // Update every 60 seconds
        setInterval(updateTimeRemaining, 60000);
    };
</script>
</body>
</html>
